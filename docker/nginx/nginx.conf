# ============================================================
# nginx/nginx.conf — Reverse proxy principal
# Recibe todo el tráfico y rutea:
#   /api/*  → backend (FastAPI)
#   /*      → frontend (Angular)
# ============================================================

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logs con formato estándar
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    sendfile        on;
    keepalive_timeout 65;

    # Ocultar versión de Nginx (seguridad)
    server_tokens off;

    # Límite de tamaño de body (para upload de avatar)
    client_max_body_size 5M;

    server {
        listen 80;
        server_name _;

        # ── API → FastAPI ──────────────────────────────────────
        location /api/ {
            proxy_pass         http://backend:8000;
            proxy_http_version 1.1;

            # Headers necesarios para FastAPI
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Timeouts generosos para endpoints de cálculo (MSI, rendimientos)
            proxy_read_timeout  60s;
            proxy_send_timeout  60s;
            proxy_connect_timeout 10s;

            # Deshabilitar buffering para streaming de respuestas
            proxy_buffering off;
        }

        # ── Docs de FastAPI (solo en desarrollo) ──────────────
        # Comentar o eliminar en producción real
        location /docs {
            proxy_pass http://backend:8000/docs;
            proxy_set_header Host $host;
        }
        location /openapi.json {
            proxy_pass http://backend:8000/openapi.json;
            proxy_set_header Host $host;
        }

        # ── Frontend → Angular ────────────────────────────────
        location / {
            proxy_pass         http://frontend:80/;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        }
    }
}
