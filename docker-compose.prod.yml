# ============================================================
# docker-compose.prod.yml — Overrides de producción
#
# Uso: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Agrega: SSL/TLS con Certbot, más workers, logs persistentes
# ============================================================

services:

  nginx:
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_certs:/etc/letsencrypt:ro

  backend:
    environment:
      WEB_CONCURRENCY: "4"
    # En producción el .env real viene de secretos del servidor
    # no del archivo .env local

  certbot:
    image: certbot/certbot:latest
    container_name: finanzas_certbot
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
    # Renovar cada 12h (Certbot solo renueva si vence en < 30 días)
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done'"
    networks:
      - finanzas_net

volumes:
  certbot_www:
  certbot_certs:
