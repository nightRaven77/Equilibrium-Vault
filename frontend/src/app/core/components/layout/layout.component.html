<div class="bg-surface text-on-surface min-h-screen flex flex-col selection:bg-primary/30 selection:text-primary overflow-x-hidden">
  
  <!-- Backdrop Overlay (Mobile Only) -->
  <div 
    *ngIf="isSidebarOpen()"
    (click)="closeSidebar()"
    class="fixed inset-0 bg-black/60 backdrop-blur-sm z-[45] md:hidden transition-opacity duration-300"
  ></div>

  <!-- SideNavBar -->
  <aside 
    class="fixed left-0 top-0 h-full w-64 z-50 bg-[#1C1B1B] border-r border-[#3B4949]/15 flex flex-col py-8 font-['Space_Grotesk'] text-sm font-medium tracking-[0.05em] uppercase transition-transform duration-300 ease-in-out md:translate-x-0"
    [class.-translate-x-full]="!isSidebarOpen()"
    [class.translate-x-0]="isSidebarOpen()"
  >
    <div class="px-6 mb-8 flex items-center justify-between">
      <div>
        <h1 class="text-2xl font-bold text-[#47EAED] font-headline tracking-tighter">Equilibrium</h1>
        <p class="font-label text-[10px] tracking-[0.2em] text-[#E5E2E1]/40 uppercase mt-1">Precision Vault</p>
      </div>
      <!-- Close button mobile -->
      <button (click)="closeSidebar()" class="md:hidden text-[#E5E2E1]/60 hover:text-primary">
        <span class="material-symbols-outlined">close</span>
      </button>
    </div>

    <!-- Main Navigation -->
    <nav class="flex-1">
      <ul class="space-y-1">
        <li>
          <a routerLink="/dashboard" routerLinkActive="text-[#47EAED] border-l-2 border-[#47EAED] bg-[#201F1F]" class="flex items-center gap-3 text-[#E5E2E1]/60 py-3 px-6 hover:text-[#E5E2E1] hover:bg-[#201F1F] transition-all duration-200 active:scale-[0.98]">
            <span class="material-symbols-outlined">dashboard</span>
            Dashboard
          </a>
        </li>
        <li>
          <a routerLink="/credit-cards" routerLinkActive="text-[#47EAED] border-l-2 border-[#47EAED] bg-[#201F1F]" class="flex items-center gap-3 text-[#E5E2E1]/60 py-3 px-6 hover:text-[#E5E2E1] hover:bg-[#201F1F] transition-all duration-200 active:scale-[0.98]">
            <span class="material-symbols-outlined">credit_card</span>
            Credit Cards
          </a>
        </li>
        <li>
          <a routerLink="/savings" routerLinkActive="text-[#47EAED] border-l-2 border-[#47EAED] bg-[#201F1F]" class="flex items-center gap-3 text-[#E5E2E1]/60 py-3 px-6 hover:text-[#E5E2E1] hover:bg-[#201F1F] transition-all duration-200 active:scale-[0.98]">
            <span class="material-symbols-outlined">savings</span>
            Savings
          </a>
        </li>
        <li>
          <a routerLink="/couples" routerLinkActive="text-[#47EAED] border-l-2 border-[#47EAED] bg-[#201F1F]" class="flex items-center gap-3 text-[#E5E2E1]/60 py-3 px-6 hover:text-[#E5E2E1] hover:bg-[#201F1F] transition-all duration-200 active:scale-[0.98]">
            <span class="material-symbols-outlined">favorite</span>
            Couples
          </a>
        </li>
      </ul>
    </nav>

    <!-- Bottom Actions -->
    <div class="px-6 mt-auto space-y-6">
      <button 
        (click)="openTransactionModal()"
        class="w-full bg-primary text-on-primary font-label text-xs font-bold py-3 rounded-lg hover:brightness-110 transition-all status-glow uppercase tracking-wider active:scale-95"
      >
        Add Transaction
      </button>

      <ul class="space-y-1">
        <li>
          <a (click)="logout()" class="flex items-center cursor-pointer gap-3 text-error/60 py-2 font-label text-xs tracking-[0.05em] uppercase hover:text-error transition-all">
            <span class="material-symbols-outlined text-sm">logout</span>
            Log Out
          </a>
        </li>
      </ul>
    </div>
  </aside>

  <!-- TopAppBar -->
  <header class="fixed top-0 right-0 left-0 md:left-64 z-40 bg-[#1C1B1B]/80 backdrop-blur-md border-b border-[#3B4949]/30 h-16 px-4 md:px-8 flex justify-between items-center shadow-[0_4px_30px_rgba(0,0,0,0.05)]">
    <div class="flex items-center gap-4">
      <!-- Hamburger Menu Mobile -->
      <button (click)="toggleSidebar()" class="md:hidden text-[#E5E2E1] p-1">
        <span class="material-symbols-outlined">menu</span>
      </button>

      <div class="hidden sm:block relative">
        <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-[#E5E2E1]/40 text-lg">search</span>
        <input class="bg-surface-container-lowest border-none font-label text-[10px] tracking-widest pl-10 pr-4 py-2 w-48 lg:w-64 focus:ring-1 focus:ring-primary transition-all rounded-md uppercase" placeholder="SEARCH VAULT..." type="text"/>
      </div>

      <!-- Compact Search for Mobile -->
      <button class="sm:hidden text-[#E5E2E1]/60">
        <span class="material-symbols-outlined">search</span>
      </button>
    </div>
    
    <div class="flex items-center gap-3 md:gap-6">
      <button class="relative text-[#E5E2E1]/60 hover:text-primary transition-colors cursor-pointer active:opacity-80">
        <span class="material-symbols-outlined">notifications</span>
        <span class="absolute top-0 right-0 w-1.5 h-1.5 bg-primary rounded-full border-2 border-[#1C1B1B]"></span>
      </button>
      
      <div class="flex items-center gap-2 md:gap-3">
        <div class="text-right hidden xs:block">
          <p class="font-label text-[9px] md:text-[10px] font-bold text-[#E5E2E1] leading-none">ALEX_VAULT_01</p>
          <p class="font-label text-[7px] md:text-[8px] text-primary tracking-tighter uppercase">PREMIUM ACCESS</p>
        </div>
        <img alt="User avatar" class="w-8 h-8 rounded-lg object-cover border border-[#3B4949]/30 grayscale hover:grayscale-0 transition-all" src="https://lh3.googleusercontent.com/aida-public/AB6AXuD5ClpFPb6f9m_13wOcYxmWf1dFy94uLUby09pOYOWx03V9YOc90tvw5mtVRhbL0RWoOSAxhItQuh-rpFNR_Kn0Am2gIn8mK00_ADLoloL8AB20aZK1zQBn6MVa2BG0MGG7bRSV2KoRY6OWGYZKVBwjzzUr27lOpoulddIUJFl3OhM5K5-iPWgbP3U4_czTmiO3fBJ1ipy43G_sOfq_mCn9it55i5hPSEyV_8KMMUgj6DeZGRw_e-Gxh-awH5A604lg6bM0pIvOhxC3"/>
      </div>
    </div>
  </header>

  <!-- Main Content Area -->
  <main class="md:ml-64 pt-20 md:pt-24 pb-12 px-4 md:px-8 min-h-screen transition-all duration-300">
    <div class="max-w-[1400px] mx-auto">
      <router-outlet></router-outlet>
    </div>
  </main>
</div>

<!-- Modals Globales -->
<app-transaction-modal></app-transaction-modal>
<app-card-modal></app-card-modal>
