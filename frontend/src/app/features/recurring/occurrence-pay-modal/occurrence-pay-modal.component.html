@if (isOpen() && payment()) {
  <div class="fixed inset-0 z-50 flex items-center justify-center p-4">
    <!-- Backdrop Blur -->
    <div class="absolute inset-0 bg-black/60 backdrop-blur-md transition-opacity duration-300 ease-out" 
         (click)="close()"></div>
         
    <!-- Modal Panel -->
    <div class="relative w-full max-w-sm bg-surface-container border border-outline-variant/30 rounded-3xl shadow-2xl p-6 md:p-8 animation-slide-up transform transition-all duration-300 ease-out z-10 mx-4">
      
      <!-- Gradient Aura -->
      <div class="absolute -bottom-24 -left-24 w-48 h-48 bg-tertiary/20 rounded-full blur-3xl pointer-events-none"></div>

      <!-- Header -->
      <div class="flex justify-between items-center mb-6">
        <h2 class="text-xl font-medium text-white tracking-tight flex items-center gap-2">
          <span class="material-symbols-outlined text-tertiary">verified</span>
          Confirmar Pago
        </h2>
        <button (click)="close()" class="p-2 -mr-2 rounded-full hover:bg-white/10 text-on-surface-variant transition-colors group">
          <span class="material-symbols-outlined text-[24px] group-hover:rotate-90 transition-transform">close</span>
        </button>
      </div>

      <!-- Plan Info Card -->
      <div class="bg-surface-container-high/50 rounded-2xl p-4 mb-6 border border-white/5 flex items-center gap-4">
        <div class="w-12 h-12 rounded-xl bg-surface-container-highest flex items-center justify-center">
          @if (getBrandLogo(payment()!.plan_name)) {
            <img [src]="'https://cdn.simpleicons.org/' + getBrandLogo(payment()!.plan_name)"
                 class="w-7 h-7 object-contain" alt="logo" />
          } @else {
            <span class="material-symbols-outlined text-on-surface-variant">event_repeat</span>
          }
        </div>
        <div>
          <h3 class="text-white font-medium">{{ payment()!.plan_name }}</h3>
          <p class="text-xs text-on-surface-variant">Programado: {{ payment()!.scheduled_date | date:'longDate' }}</p>
        </div>
      </div>

      <!-- Amount Highlight -->
      <div class="text-center mb-8">
        <p class="text-xs text-on-surface-variant uppercase tracking-widest mb-1">Monto a Pagar</p>
        <h4 class="text-3xl font-mono font-bold text-white">
          {{ payment()!.amount | currency:'MXN' }}
        </h4>
      </div>

      <form [formGroup]="payForm" (ngSubmit)="onSubmit()" class="flex flex-col gap-4">

        <div class="flex flex-col">
          <label class="text-sm font-medium text-on-surface-variant mb-1">¿El monto fue diferente?</label>
          <div class="relative">
            <span class="absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant">$</span>
            <input type="number" formControlName="amount_override" placeholder="Ingresa el monto real cobrado" step="0.01" min="0"
                 class="w-full bg-surface border border-outline-variant/30 rounded-xl pl-8 pr-4 py-3 text-white placeholder-on-surface-variant/50 focus:border-tertiary focus:ring-1 focus:ring-tertiary transition-colors">
          </div>
        </div>

        <div class="flex flex-col">
          <label class="text-sm font-medium text-on-surface-variant mb-1">Notas (Opcional)</label>
          <input type="text" formControlName="notes" placeholder="Ej. Incluye cargo por mora"
                 class="w-full bg-surface border border-outline-variant/30 rounded-xl px-4 py-3 text-white focus:border-tertiary focus:ring-1 focus:ring-tertiary transition-colors">
        </div>

        <!-- Acciones -->
        <div class="flex flex-col gap-2 mt-4">
          <button type="submit" 
                  [disabled]="payForm.invalid || isSaving()"
                  class="w-full py-3.5 rounded-2xl bg-tertiary text-on-tertiary font-semibold hover:bg-tertiary-container disabled:opacity-50 disabled:cursor-not-allowed transition-all shadow-lg shadow-tertiary/20 flex items-center justify-center gap-2">
            @if (isSaving()) {
              <span class="material-symbols-outlined animate-spin text-[20px]">progress_activity</span>
              Procesando...
            } @else {
              Confirmar Pago
            }
          </button>
          
          <button type="button" 
                  (click)="close()"
                  class="w-full py-3 rounded-2xl text-on-surface-variant hover:bg-white/5 font-medium transition-colors">
            Cancelar
          </button>
        </div>

      </form>
    </div>
  </div>
}
